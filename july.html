<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/mounths.css">
	<link rel="stylesheet" href="css/style.css">
	<script src="db/ruznama_k.db"></script>
    <title>Курахский р-он</title>
		
</head>
<body>

<header class="header">
            <div class="text_fon">
                <h1 class="header_text">Июль</h1>
                <a href="index.html"><img src="img/calendarback.svg" alt=""></a>
                <div class="header_fon"></div>
            </div>
            <div class="text_line">
                <p class="header_subtext" id="navbarsubtext">Курахский р-он</p>
            </div>
        </header>
    <div class="app">
        <div class="content">
            <div class="table">
			<table>
				<tr>
					<th scope="col">Чис.</th>
					<th scope="col">Фаджр</th>
					<th scope="col">Вос.</th>
					<th scope="col">Зухр</th>
					<th scope="col">Аср</th>
					<th scope="col">Магриб</th>
					<th scope="col">Иша</th>
				</tr>
			<script>
				for(x = 0; x < july.length; x++) {
				var serializedUser = JSON.stringify(july[x]);
				var user = JSON.parse(serializedUser);
				
				
				
				

				document.write("<tr><td>" + user.date + "</td><td>" + user.fajr + "</td><td>" + user.sunrise + "</td><td>" + user.dhuhr + "</td><td>" + user.asr + "</td><td>" + user.maghrib + "</td><td>" + user.isha + "</td></tr>");
				
				
				}
			
			
			</script>
			</table>
			
			
		</div>    
        </div>    
    </div>
	
	<script type="text/javascript" src="js/js.js"></script>
	
</body>
</html>
