        <div class="content">
            <div class="table">
			<table>
				<tr>
					<th scope="col">Чис.</th>
					<th scope="col">Фаджр</th>
					<th scope="col">Вос.</th>
					<th scope="col">Зухр</th>
					<th scope="col">Аср</th>
					<th scope="col">Магриб</th>
					<th scope="col">Иша</th>
				</tr>
			<script>
				for(x = 0; x < april.length; x++) {
				var serializedUser = JSON.stringify(april[x]);
				var user = JSON.parse(serializedUser);
				
				document.write("<tr><td>" + user.date + "</td><td>" + user.fajr + "</td><td>" + user.sunrise + "</td><td>" + user.dhuhr + "</td><td>" + user.asr + "</td><td>" + user.maghrib + "</td><td>" + user.isha + "</td></tr>");
				
				
				}
			
			
			</script>
			</table>
